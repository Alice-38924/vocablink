<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联想背单词</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: #f7f3f0; color: #2d2d2d; min-height: 100vh;
}
header {
  background: #fff; border-bottom: 1px solid #e8e2dc;
  padding: 24px; text-align: center; position: sticky; top: 0; z-index: 20;
}
header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
header p { font-size: 13px; color: #b8b8b8; margin-top: 2px; }
.container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }

.card { background: #fff; border-radius: 16px; padding: 28px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 16px; }

/* ===== Stats ===== */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: #fff; border-radius: 14px; padding: 20px 10px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.stat-card .stat-icon { font-size: 24px; margin-bottom: 4px; }
.stat-card .stat-value { font-size: 26px; font-weight: 700; color: #c9a96e; }
.stat-card .stat-label { font-size: 11px; color: #b8b8b8; margin-top: 2px; }

/* ===== Check-in ===== */
.checkin-area { display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: 14px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 12px; }
.checkin-area .ci-left { display: flex; align-items: center; gap: 12px; }
.checkin-area .ci-left .ci-icon { font-size: 28px; }
.checkin-area .ci-left .ci-text { font-size: 15px; font-weight: 600; }
.checkin-area .ci-left .ci-sub { font-size: 12px; color: #b8b8b8; margin-top: 1px; }
.btn-checkin { padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-checkin.active { background: #c9a96e; color: #fff; }
.btn-checkin.active:hover { background: #b8955a; }
.btn-checkin.done { background: #e8e2dc; color: #b8b8b8; cursor: default; }

/* ===== Calendar ===== */
.week-calendar { display: flex; justify-content: space-between; background: #fff; border-radius: 14px; padding: 14px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 16px; }
.week-calendar .cal-day { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.week-calendar .cal-day .cal-label { font-size: 11px; color: #d0d0d0; font-weight: 500; }
.week-calendar .cal-day .cal-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #f7f3f0; color: #d0d0d0; }
.week-calendar .cal-day .cal-dot.filled { background: #c9a96e; color: #fff; }
.week-calendar .cal-day .cal-dot.today { border: 2px solid #d4c5b8; background: #fff; color: #2d2d2d; }
.week-calendar .cal-day .cal-dot.today.filled { border-color: #c9a96e; background: #c9a96e; color: #fff; }
.week-calendar .cal-day .cal-dot.future { opacity: 0.3; }

/* ===== Book bar ===== */
.book-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #fff; border-radius: 14px; padding: 14px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.book-bar label { font-size: 13px; font-weight: 600; color: #4a4a4a; white-space: nowrap; }
.book-bar select { flex: 1; padding: 6px 10px; border: 1.5px solid #e8e2dc; border-radius: 8px; font-size: 13px; outline: none; background: #fafaf9; cursor: pointer; color: #2d2d2d; }
.book-bar select:focus { border-color: #c9a96e; }
.book-bar .btn-sm { padding: 6px 12px; border: 1.5px solid #e8e2dc; border-radius: 8px; background: none; font-size: 12px; cursor: pointer; color: #b8b8b8; white-space: nowrap; transition: all 0.2s; }
.book-bar .btn-sm:hover { border-color: #c9a96e; color: #c9a96e; }

/* ===== Word count bar ===== */
.word-count-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: #fff; border-radius: 14px; padding: 14px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.word-count-bar label { font-size: 13px; font-weight: 600; color: #4a4a4a; white-space: nowrap; }
.word-count-bar select { flex: 1; padding: 6px 10px; border: 1.5px solid #e8e2dc; border-radius: 8px; font-size: 13px; outline: none; background: #fafaf9; cursor: pointer; color: #2d2d2d; }
.word-count-bar select:focus { border-color: #c9a96e; }
.word-count-bar .total-note { font-size: 11px; color: #d0d0d0; white-space: nowrap; }

/* ===== Mode cards ===== */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mode-card { background: #fff; border: 1.5px solid #e8e2dc; border-radius: 14px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
.mode-card:hover { border-color: #c9a96e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201,169,110,0.12); }
.mode-card .icon { font-size: 40px; margin-bottom: 10px; }
.mode-card .label { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.mode-card .desc { font-size: 12px; color: #b8b8b8; line-height: 1.4; }

/* ===== Exit ===== */
.btn-exit { padding: 6px 14px; background: none; border: 1.5px solid #e8e2dc; border-radius: 8px; font-size: 13px; color: #b8b8b8; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.btn-exit:hover { border-color: #d4c5b8; color: #2d2d2d; }

/* ===== Progress ===== */
.progress-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 13px; color: #b8b8b8; }
.progress-track { flex: 1; height: 4px; background: #f0ebe6; border-radius: 2px; margin: 0 12px; overflow: hidden; }
.progress-fill { height: 100%; background: #c9a96e; border-radius: 2px; transition: width 0.3s; }

/* ===== Word card ===== */
.word-card { background: #fafaf9; border: 1.5px solid #f0ebe6; border-radius: 14px; padding: 28px 20px; text-align: center; margin-bottom: 24px; }
.word-card .en { font-size: 34px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
.word-card .phonetic { font-size: 14px; color: #c9a96e; margin-bottom: 8px; }
.word-card .def { font-size: 14px; color: #4a4a4a; max-width: 460px; margin: 0 auto 10px; line-height: 1.6; }
.word-card .def .pos { font-weight: 600; color: #b8955a; }
.word-card .zh { font-size: 16px; color: #b8b8b8; }
.word-card .def-loading { font-size: 12px; color: #d0d0d0; }

/* ===== Forms ===== */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #b8b8b8; margin-bottom: 4px; font-weight: 500; }
.input-field { width: 100%; padding: 11px 14px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; background: #fafaf9; }
.input-field:focus { border-color: #c9a96e; background: #fff; }

.btn-primary { width: 100%; padding: 13px; background: #c9a96e; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-primary:hover { background: #b8955a; }
.btn-primary:disabled { background: #e8e2dc; color: #d0d0d0; cursor: not-allowed; }

/* ===== Emoji modal ===== */
#emojiModal {
  position: fixed; inset: 0; z-index: 100; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.25);
}
#emojiModal.open { display: flex; }
#emojiModal .modal-box { background: #fff; border-radius: 16px; padding: 8px; width: 360px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
#emojiModal .modal-box emoji-picker { width: 100%; height: 400px; }
#emojiModal .modal-close-btn {
  display: block; margin: 8px auto 4px; padding: 8px 24px;
  background: #f7f3f0; border: none; border-radius: 8px;
  font-size: 13px; color: #b8b8b8; cursor: pointer;
}

.emoji-btn { padding: 10px 20px; background: #fafaf9; border: 1.5px solid #e8e2dc; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
.emoji-btn:hover { border-color: #c9a96e; background: #fff; }
.emoji-display { width: 64px; height: 64px; border: 1.5px dashed #e8e2dc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; transition: all 0.2s; }
.emoji-display.filled { border-style: solid; border-color: #c9a96e; }
.emoji-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }

/* ===== Review ===== */
.clue-area { background: #fafaf9; border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 20px; border: 1.5px solid #f0ebe6; }
.clue-area .label { font-size: 12px; color: #b8b8b8; margin-bottom: 8px; }
.clue-area .clue-words { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.clue-area .clue-words span { background: #fff; border: 1.5px solid #e8e2dc; padding: 6px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
.clue-area .clue-emoji { font-size: 60px; }

.options { display: grid; gap: 10px; }
.option-btn { padding: 13px 18px; border: 1.5px solid #e8e2dc; border-radius: 10px; background: #fff; font-size: 15px; cursor: pointer; text-align: center; font-weight: 500; transition: all 0.15s; }
.option-btn:hover { border-color: #c9a96e; background: #fafaf9; }
.option-btn.correct { border-color: #9bb88b; background: #f6f9f4; color: #5a7a4a; }
.option-btn.wrong { border-color: #d49595; background: #fdf5f5; color: #8a4a4a; }
.option-btn:disabled { cursor: default; }

/* ===== Result ===== */
.result-score { text-align: center; padding: 28px 0; }
.result-score .score-num { font-size: 56px; font-weight: 700; color: #c9a96e; }
.result-score .score-label { font-size: 14px; color: #b8b8b8; margin-top: 4px; }
.result-detail { margin: 16px 0; }
.result-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #f0ebe6; }
.result-item .ri-word { font-weight: 600; font-size: 14px; }
.result-item .ri-word .ri-zh { color: #b8b8b8; font-weight: 400; font-size: 13px; }
.result-item .ri-status { font-size: 18px; }
.result-actions { display: flex; gap: 10px; margin-top: 20px; }
.result-actions .btn-primary, .result-actions .btn-secondary { flex: 1; }
.btn-secondary { padding: 13px; background: #fafaf9; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; color: #2d2d2d; }
.btn-secondary:hover { border-color: #d4c5b8; background: #fff; }

/* ===== Badges ===== */
.mode-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.mode-badge.toefl { background: #f7f3f0; color: #c9a96e; }
.mode-badge.association { background: #f6f9f4; color: #9bb88b; }
.mode-badge.emoji { background: #fdf5f5; color: #d49595; }

/* ===== Book management ===== */
.mgmt-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.mgmt-header h3 { font-size: 18px; font-weight: 700; flex: 1; }
.mgmt-header .btn-back { padding: 6px 12px; border: 1.5px solid #e8e2dc; border-radius: 8px; background: none; font-size: 13px; cursor: pointer; color: #b8b8b8; }
.mgmt-header .btn-back:hover { border-color: #d4c5b8; color: #2d2d2d; }
.mgmt-list { margin: 12px 0; }
.mgmt-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1.5px solid #f0ebe6; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.mgmt-item:hover { border-color: #d4c5b8; }
.mgmt-item .mi-info { flex: 1; }
.mgmt-item .mi-title { font-size: 15px; font-weight: 600; }
.mgmt-item .mi-sub { font-size: 12px; color: #b8b8b8; margin-top: 2px; }
.mgmt-item .mi-actions { display: flex; gap: 6px; }
.mgmt-item .mi-actions button { padding: 4px 10px; border: 1px solid #e8e2dc; border-radius: 6px; background: none; font-size: 12px; cursor: pointer; color: #b8b8b8; }
.mgmt-item .mi-actions button:hover { border-color: #d49595; color: #d49595; }
.mgmt-item .mi-actions button.edit:hover { border-color: #c9a96e; color: #c9a96e; }

.mgmt-add { display: flex; gap: 8px; margin-bottom: 16px; }
.mgmt-add input { flex: 1; padding: 10px 14px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 14px; outline: none; background: #fafaf9; }
.mgmt-add input:focus { border-color: #c9a96e; }
.mgmt-add button { padding: 10px 20px; background: #c9a96e; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.mgmt-add button:hover { background: #b8955a; }

.word-add-row { display: flex; gap: 8px; margin-bottom: 16px; }
.word-add-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #e8e2dc; border-radius: 10px; font-size: 14px; outline: none; background: #fafaf9; }
.word-add-row input:focus { border-color: #c9a96e; }
.word-add-row button { padding: 10px 16px; background: #c9a96e; color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.word-add-row button:hover { background: #b8955a; }

.word-list { margin: 8px 0; }
.wl-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0ebe6; }
.wl-item .wl-word { font-size: 14px; font-weight: 600; }
.wl-item .wl-zh { font-size: 13px; color: #b8b8b8; margin-left: 8px; }
.wl-item .wl-del { padding: 2px 8px; border: none; background: none; font-size: 16px; cursor: pointer; color: #d0d0d0; }
.wl-item .wl-del:hover { color: #d49595; }

.empty-note { text-align: center; padding: 32px 0; color: #d0d0d0; font-size: 14px; }

.hidden { display: none !important; }

@media (max-width: 500px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stat-card:last-child { grid-column: span 2; }
  .card { padding: 20px 16px; }
  .word-card .en { font-size: 28px; }
  .mode-grid { grid-template-columns: 1fr; }
}
</style>
</head>

const STORAGE_KEY = 'vocabLinkApp';
const DEF_CACHE_KEY = 'vocabDefCache';
const STATS_KEY = 'vocabStats';
const BOOKS_KEY = 'vocabBooks';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===== Persist helpers ===== */
function loadJSON(key, def) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : def; } catch { return def; } }
function saveJSON(key, v) { localStorage.setItem(key, JSON.stringify(v)); }

function loadState() { return loadJSON(STORAGE_KEY, null); }
function saveState(s) { saveJSON(STORAGE_KEY, s); }
function clearState() { localStorage.removeItem(STORAGE_KEY); }

function loadStats() { return loadJSON(STATS_KEY, null); }
function saveStats(s) { saveJSON(STATS_KEY, s); }
function defaultStats() { return { checkInDates: [], totalWords: 0, totalSessions: 0 }; }

/* ===== Books ===== */
function loadBooks() {
  let books = loadJSON(BOOKS_KEY, null);
  if (!books) {
    books = { [DEFAULT_BOOK_NAME]: { words: [...TOEFL_WORDS], isDefault: true } };
    saveJSON(BOOKS_KEY, books);
  } else if (!books[DEFAULT_BOOK_NAME]) {
    books[DEFAULT_BOOK_NAME] = { words: [...TOEFL_WORDS], isDefault: true };
    saveJSON(BOOKS_KEY, books);
  }
  return books;
}
function saveBooks(books) { saveJSON(BOOKS_KEY, books); }
function getBookNames() { return Object.keys(loadBooks()); }
function getBook(name) { const b = loadBooks(); return b[name] || null; }
function getBookWordCount(name) { const b = getBook(name); return b ? b.words.length : 0; }

/* ===== Date ===== */
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function calcStreak(dates) {
  if (!dates || !dates.length) return 0;
  const set = new Set(dates);
  let streak = 0, d = new Date();
  if (!set.has(getToday())) d.setDate(d.getDate() - 1);
  while (true) {
    const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (set.has(s)) { streak++; d.setDate(d.getDate() - 1); } else break;
  }
  return streak;
}
function doCheckIn() {
  const stats = loadStats() || defaultStats();
  const today = getToday();
  if (!stats.checkInDates.includes(today)) {
    stats.checkInDates.push(today);
    stats.totalSessions = (stats.totalSessions || 0) + 1;
    saveStats(stats);
  }
  return stats;
}

/* ===== Definition API ===== */
function getCachedDef(word) { return loadJSON(DEF_CACHE_KEY, {})[word] || null; }
function setCachedDef(word, data) {
  const c = loadJSON(DEF_CACHE_KEY, {});
  c[word] = data;
  saveJSON(DEF_CACHE_KEY, c);
}
async function fetchDefinition(word) {
  const c = getCachedDef(word);
  if (c) return c;
  const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
  if (!r.ok) throw new Error('Not found');
  const d = await r.json();
  setCachedDef(word, d);
  return d;
}
function formatDef(data) {
  if (!data || !data[0] || !data[0].meanings) return null;
  const e = data[0];
  const phonetic = e.phonetic || (e.phonetics && e.phonetics.find(p => p.text)?.text) || '';
  const m = e.meanings[0];
  return { phonetic, pos: m.partOfSpeech, def: m.definitions[0]?.definition || '' };
}

function defaultState() {
  return { mode: null, phase: null, wordList: [], currentIdx: 0, reviewIdx: 0, entries: {}, reviewResults: [], wordCount: 10, selectedBook: DEFAULT_BOOK_NAME };
}

const saved = loadState();
if (saved && saved.phase && saved.phase !== 'done') { state = saved; }

/* ===== Render ===== */
function render() {
  if (!state.phase || state.phase === 'done') {
    if (!state.phase) renderHome();
    else renderResult();
  } else if (state.phase === 'learning') renderLearning();
  else if (state.phase === 'review') renderReview();
}

/* ============ START ============ */
function startMode(mode) {
  const books = loadBooks();
  const bookName = state.selectedBook && books[state.selectedBook] ? state.selectedBook : DEFAULT_BOOK_NAME;
  const bookWords = books[bookName].words;
  const count = Math.min(state.wordCount || 10, bookWords.length);
  const selected = shuffle(bookWords).slice(0, count);

  state = defaultState();
  state.mode = mode; state.phase = 'learning';
  state.wordList = selected; state.wordCount = count;
  state.selectedBook = bookName;
  state.currentIdx = 0; state.entries = {}; state.reviewResults = [];

  stats = doCheckIn();
  saveState(state);
  render();
}

/* ============ LEARNING ============ */
function renderLearning() {
  const word = state.wordList[state.currentIdx];
  const total = state.wordList.length;
  const current = state.currentIdx + 1;
  const progress = (current / total) * 100;
  const isAssoc = state.mode === 'association';

  const cdef = getCachedDef(word.en);
  let defHTML = '<div class="def-loading">加载释义中...</div>';
  if (cdef) {
    const f = formatDef(cdef);
    defHTML = f ? `<div class="phonetic">${f.phonetic}</div><div class="def"><span class="pos">${f.pos}</span> ${f.def}</div>` : '';
  } else {
    fetchDefinition(word.en).then(() => { if (state.phase==='learning' && state.wordList[state.currentIdx]?.en===word.en) renderLearning(); })
      .catch(() => setCachedDef(word.en, { _error: true }));
  }

  let inputHTML = '';
  if (isAssoc) {
    const sv = state.entries[word.en]?.association || ['','','','',''];
    inputHTML = `<div style="margin-bottom:14px;text-align:center;font-size:13px;color:#b8b8b8;">输入 5 个与 <strong style="color:#2d2d2d;">${word.en}</strong> 相关的单词</div>
      ${[0,1,2,3,4].map(i => `<div class="form-group"><label>联想词 ${i+1}</label><input class="input-field assoc-input" type="text" value="${sv[i]}" placeholder="输入相关英语单词" data-idx="${i}"></div>`).join('')}`;
  } else {
    const sel = state.entries[word.en]?.emoji || '';
    inputHTML = `<div style="text-align:center;margin-bottom:14px;font-size:13px;color:#b8b8b8;">选择一个 Emoji 代表 <strong style="color:#2d2d2d;">${word.en}</strong></div>
      <div class="emoji-row">
        <div class="emoji-display ${sel?'filled':''}" id="emojiDisplay">${sel||'?'}</div>
        <button class="emoji-btn" id="openEmojiBtn">选择 Emoji</button>
      </div>`;
  }

  $app.innerHTML = `
    <div class="card">
      <div class="progress-bar">
        <button class="btn-exit" id="exitBtn">← 退出</button>
        <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span class="mode-badge ${isAssoc?'association':'emoji'}">${current}/${total}</span>
      </div>
      <div class="word-card">
        <div class="en">${word.en}</div>
        ${defHTML}
        <div class="zh">${word.zh}</div>
      </div>
      <form id="learningForm">
        ${inputHTML}
        <button type="submit" class="btn-primary">提交</button>
      </form>
    </div>
  `;

  document.getElementById('exitBtn').addEventListener('click', () => {
    saveState(state); state = defaultState(); clearState(); render();
  });

  if (!isAssoc) {
    document.getElementById('openEmojiBtn').addEventListener('click', (e) => {
      e.preventDefault();
      openEmojiPicker((unicode) => {
        document.getElementById('emojiDisplay').textContent = unicode;
        document.getElementById('emojiDisplay').classList.add('filled');
        state.entries[word.en] = state.entries[word.en] || {};
        state.entries[word.en].emoji = unicode;
        saveState(state);
      });
    });
  }

  document.getElementById('learningForm').addEventListener('submit', (e) => {
    e.preventDefault();
    if (isAssoc) {
      const inputs = document.querySelectorAll('.assoc-input');
      const words = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
      if (words.length < 5) { alert('请填写全部 5 个联想词'); return; }
      state.entries[word.en] = { association: words };
    } else {
      if (!state.entries[word.en]?.emoji) { alert('请选择一个 Emoji'); return; }
    }
    saveState(state);
    state.currentIdx++;
    if (state.currentIdx >= state.wordList.length) {
      state.phase = 'review'; state.reviewIdx = 0; state.reviewResults = []; state.wordList = shuffle(state.wordList);
      saveState(state); render();
    } else { saveState(state); render(); }
  });
}

/* ============ REVIEW ============ */
function renderReview() {
  const word = state.wordList[state.reviewIdx];
  const total = state.wordList.length;
  const current = state.reviewIdx + 1;
  const progress = (current / total) * 100;
  const entry = state.entries[word.en];
  const isAssoc = state.mode === 'association';

  if (!entry || (isAssoc && !entry.association) || (!isAssoc && !entry.emoji)) {
    state.reviewIdx++;
    if (state.reviewIdx >= total) { state.phase = 'done'; saveState(state); render(); } else render();
    return;
  }

  const correct = word.en;
  const others = state.wordList.filter(w => w.en !== correct).map(w => w.en).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = shuffle([correct, ...others]);

  const clue = isAssoc
    ? `<div class="clue-area"><div class="label">你的联想词</div><div class="clue-words">${entry.association.map(w => `<span>${w}</span>`).join('')}</div></div>`
    : `<div class="clue-area"><div class="label">你选的 Emoji</div><div class="clue-emoji">${entry.emoji}</div></div>`;

  $app.innerHTML = `
    <div class="card">
      <div class="progress-bar">
        <button class="btn-exit" id="exitBtn">← 退出</button>
        <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span class="mode-badge ${isAssoc?'association':'emoji'}">${current}/${total}</span>
      </div>
      ${clue}
      <div style="text-align:center;margin-bottom:18px;font-size:15px;font-weight:600;">哪个词对应这个联想？</div>
      <div class="options">${options.map(o => `<button class="option-btn" data-word="${o}" ${state.reviewResults[state.reviewIdx]?'disabled':''}>${o}</button>`).join('')}</div>
      <div id="fb" class="${state.reviewResults[state.reviewIdx]?'':'hidden'}" style="margin-top:16px;text-align:center;">
        ${state.reviewResults[state.reviewIdx] ? (state.reviewResults[state.reviewIdx].correct ? '<span style="color:#9bb88b;font-weight:600;font-size:16px;">✓ 正确</span>' : `<span style="color:#d49595;font-weight:600;font-size:16px;">✗ 正确答案是 <strong style="color:#2d2d2d;">${correct}</strong></span>`) : ''}
        <br>
        <button class="btn-primary" id="nextBtn" style="margin-top:12px;width:auto;padding:10px 32px;">${state.reviewIdx < total-1 ? '下一题' : '查看结果'}</button>
      </div>
    </div>
  `;

  document.getElementById('exitBtn').addEventListener('click', () => {
    saveState(state); state = defaultState(); clearState(); render();
  });

  if (!state.reviewResults[state.reviewIdx]) {
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const chosen = btn.dataset.word;
        const ok = chosen === correct;
        document.querySelectorAll('.option-btn').forEach(b => {
          b.disabled = true;
          if (b.dataset.word === correct) b.classList.add('correct');
          else if (b.dataset.word === chosen && !ok) b.classList.add('wrong');
        });
        state.reviewResults[state.reviewIdx] = { correct: ok, chosen, answer: correct };
        saveState(state);
        document.getElementById('fb').classList.remove('hidden');
        document.getElementById('fb').innerHTML = `
          ${ok ? '<span style="color:#9bb88b;font-weight:600;font-size:16px;">✓ 正确</span>' : `<span style="color:#d49595;font-weight:600;font-size:16px;">✗ 正确答案是 <strong style="color:#2d2d2d;">${correct}</strong></span>`}
          <br>
          <button class="btn-primary" id="nextBtn" style="margin-top:12px;width:auto;padding:10px 32px;">${state.reviewIdx < total-1 ? '下一题' : '查看结果'}</button>
        `;
        document.getElementById('nextBtn').addEventListener('click', nextReview);
      });
    });
  } else {
    document.getElementById('nextBtn').addEventListener('click', nextReview);
  }
}

function nextReview() {
  state.reviewIdx++;
  if (state.reviewIdx >= state.wordList.length) { state.phase = 'done'; saveState(state); render(); }
  else { saveState(state); render(); }
}

/* ============ RESULT ============ */
function renderResult() {
  const results = state.reviewResults;
  const correctCount = results.filter(r => r && r.correct).length;
  const total = results.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  const isAssoc = state.mode === 'association';

  stats = loadStats() || defaultStats();
  stats.totalWords = (stats.totalWords || 0) + state.wordList.length;
  saveStats(stats);

  const items = state.wordList.map(w => {
    const r = results.find(res => res && res.answer === w.en);
    return { word: w, result: r };
  }).filter(i => i.result);

  $app.innerHTML = `
    <div class="card">
      <div style="text-align:center;margin-bottom:4px;"><span class="mode-badge ${isAssoc?'association':'emoji'}">${isAssoc?'联想词':'Emoji'}模式</span></div>
      <div class="result-score"><div class="score-num">${pct}%</div><div class="score-label">${correctCount} / ${total} 正确</div></div>
      <div class="result-detail">${items.map(i => `<div class="result-item"><span class="ri-word">${i.word.en} <span class="ri-zh">${i.word.zh}</span></span><span class="ri-status">${i.result.correct?'✅':'❌'}</span></div>`).join('')}</div>
      <div class="result-actions"><button class="btn-primary" data-action="retry">再学一轮</button><button class="btn-secondary" data-action="home">首页</button></div>
    </div>
  `;
  $app.querySelector('[data-action="retry"]').addEventListener('click', () => startMode(state.mode));
  $app.querySelector('[data-action="home"]').addEventListener('click', () => { state = defaultState(); clearState(); render(); });
}

render();
</script>
</body>
</html>
