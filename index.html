<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>联想背单词</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f7f3f0;color:#2d2d2d;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e8e2dc;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
header .h-left h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
header .h-left p{font-size:12px;color:#b8b8b8;margin-top:1px}
header .h-right{display:flex;align-items:center;gap:10px;font-size:13px}
header .h-right .uname{color:#b8b8b8}
header .h-right .logout{color:#d49595;cursor:pointer;background:none;border:none;font-size:13px;padding:4px 10px}
header .h-right .logout:hover{opacity:.7}
.container{max-width:640px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:16px}

/* Auth */
.auth-wrap{max-width:400px;margin:40px auto}
.auth-wrap .logo{text-align:center;margin-bottom:28px}
.auth-wrap .logo h1{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.auth-wrap .logo p{font-size:13px;color:#b8b8b8;margin-top:4px}
.auth-box{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.auth-box h3{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}
.auth-box .field{margin-bottom:16px}
.auth-box .field label{display:block;font-size:12px;color:#b8b8b8;margin-bottom:4px;font-weight:500}
.auth-box .field input{width:100%;padding:11px 14px;border:1.5px solid #e8e2dc;border-radius:10px;font-size:15px;outline:0;background:#fafaf9;transition:border .2s}
.auth-box .field input:focus{border-color:#c9a96e;background:#fff}
.auth-box .btn-auth{width:100%;padding:13px;background:#c9a96e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.auth-box .btn-auth:hover{background:#b8955a}
.auth-box .btn-auth:disabled{background:#e8e2dc;color:#d0d0d0;cursor:default}
.auth-box .auth-links{text-align:center;margin-top:16px;font-size:13px;color:#b8b8b8}
.auth-box .auth-links a{color:#c9a96e;cursor:pointer;text-decoration:none}
.auth-box .auth-links a:hover{text-decoration:underline}
.auth-box .step-note{text-align:center;font-size:13px;color:#b8b8b8;margin-bottom:16px;padding:10px;background:#fafaf9;border-radius:8px}
.auth-box .email-hint{text-align:center;font-size:14px;color:#2d2d2d;margin:12px 0;padding:10px;background:#f6f9f4;border-radius:8px}
.auth-box .reset-code-box{text-align:center;margin:16px 0}
.auth-box .reset-code-box .code-display{font-size:32px;font-weight:700;letter-spacing:8px;color:#c9a96e;padding:16px;background:#fafaf9;border-radius:12px;border:1.5px dashed #e8e2dc}
.auth-box .reset-code-box .code-note{font-size:12px;color:#b8b8b8;margin-top:8px}
.auth-error{text-align:center;font-size:13px;color:#d49595;margin-bottom:12px}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:20px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-card .stat-icon{font-size:24px;margin-bottom:4px}
.stat-card .stat-value{font-size:26px;font-weight:700;color:#c9a96e}
.stat-card .stat-label{font-size:11px;color:#b8b8b8;margin-top:2px}

/* Check-in */
.checkin-area{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:12px}
.checkin-area .ci-left{display:flex;align-items:center;gap:12px}
.checkin-area .ci-left .ci-icon{font-size:28px}
.checkin-area .ci-left .ci-text{font-size:15px;font-weight:600}
.checkin-area .ci-left .ci-sub{font-size:12px;color:#b8b8b8;margin-top:1px}
.btn-checkin{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-checkin.active{background:#c9a96e;color:#fff}
.btn-checkin.active:hover{background:#b8955a}
.btn-checkin.done{background:#e8e2dc;color:#b8b8b8;cursor:default}

/* Calendar */
.week-calendar{display:flex;justify-content:space-between;background:#fff;border-radius:14px;padding:14px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:16px}
.week-calendar .cal-day{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.week-calendar .cal-day .cal-label{font-size:11px;color:#d0d0d0;font-weight:500}
.week-calendar .cal-day .cal-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:#f7f3f0;color:#d0d0d0}
.week-calendar .cal-day .cal-dot.filled{background:#c9a96e;color:#fff}
.week-calendar .cal-day .cal-dot.today{border:2px solid #d4c5b8;background:#fff;color:#2d2d2d}
.week-calendar .cal-day .cal-dot.today.filled{border-color:#c9a96e;background:#c9a96e;color:#fff}
.week-calendar .cal-day .cal-dot.future{opacity:.3}

/* Book bar */
.book-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#fff;border-radius:14px;padding:14px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.book-bar label{font-size:13px;font-weight:600;color:#4a4a4a;white-space:nowrap}
.book-bar select{flex:1;padding:6px 10px;border:1.5px solid #e8e2dc;border-radius:8px;font-size:13px;outline:none;background:#fafaf9;cursor:pointer;color:#2d2d2d}
.book-bar select:focus{border-color:#c9a96e}
.book-bar .btn-sm{padding:6px 12px;border:1.5px solid #e8e2dc;border-radius:8px;background:none;font-size:12px;cursor:pointer;color:#b8b8b8;white-space:nowrap}
.book-bar .btn-sm:hover{border-color:#c9a96e;color:#c9a96e}

/* Word count */
.word-count-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#fff;border-radius:14px;padding:14px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.word-count-bar label{font-size:13px;font-weight:600;color:#4a4a4a;white-space:nowrap}
.word-count-bar select{flex:1;padding:6px 10px;border:1.5px solid #e8e2dc;border-radius:8px;font-size:13px;outline:none;background:#fafaf9;cursor:pointer;color:#2d2d2d}
.word-count-bar select:focus{border-color:#c9a96e}
.word-count-bar .total-note{font-size:11px;color:#d0d0d0;white-space:nowrap}

/* Mode cards */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode-card{background:#fff;border:1.5px solid #e8e2dc;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s}
.mode-card:hover{border-color:#c9a96e;transform:translateY(-2px);box-shadow:0 4px 12px rgba(201,169,110,.12)}
.mode-card .icon{font-size:40px;margin-bottom:10px}
.mode-card .label{font-size:16px;font-weight:600;margin-bottom:4px}
.mode-card .desc{font-size:12px;color:#b8b8b8;line-height:1.4}

/* Exit */
.btn-exit{padding:6px 14px;background:none;border:1.5px solid #e8e2dc;border-radius:8px;font-size:13px;color:#b8b8b8;cursor:pointer;font-weight:500}
.btn-exit:hover{border-color:#d4c5b8;color:#2d2d2d}

/* Progress */
.progress-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:#b8b8b8}
.progress-track{flex:1;height:4px;background:#f0ebe6;border-radius:2px;margin:0 12px;overflow:hidden}
.progress-fill{height:100%;background:#c9a96e;border-radius:2px;transition:width .3s}

/* Word card */
.word-card{background:#fafaf9;border:1.5px solid #f0ebe6;border-radius:14px;padding:28px 20px;text-align:center;margin-bottom:24px}
.word-card .en{font-size:34px;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}
.word-card .phonetic{font-size:14px;color:#c9a96e;margin-bottom:8px}
.word-card .def{font-size:14px;color:#4a4a4a;max-width:460px;margin:0 auto 10px;line-height:1.6}
.word-card .def .pos{font-weight:600;color:#b8955a}
.word-card .zh{font-size:16px;color:#b8b8b8}
.word-card .def-loading{font-size:12px;color:#d0d0d0}

/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#b8b8b8;margin-bottom:4px;font-weight:500}
.input-field{width:100%;padding:11px 14px;border:1.5px solid #e8e2dc;border-radius:10px;font-size:15px;outline:0;background:#fafaf9}
.input-field:focus{border-color:#c9a96e;background:#fff}
.btn-primary{width:100%;padding:13px;background:#c9a96e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#b8955a}
.btn-primary:disabled{background:#e8e2dc;color:#d0d0d0;cursor:default}

/* Emoji modal */
#emojiModal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.25)}
#emojiModal.open{display:flex}
#emojiModal .modal-box{background:#fff;border-radius:16px;padding:8px;width:360px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.12)}
#emojiModal .modal-box emoji-picker{width:100%;height:400px}
#emojiModal .modal-close-btn{display:block;margin:8px auto 4px;padding:8px 24px;background:#f7f3f0;border:none;border-radius:8px;font-size:13px;color:#b8b8b8;cursor:pointer}
.emoji-btn{padding:10px 20px;background:#fafaf9;border:1.5px solid #e8e2dc;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.emoji-btn:hover{border-color:#c9a96e;background:#fff}
.emoji-display{width:64px;height:64px;border:1.5px dashed #e8e2dc;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px}
.emoji-display.filled{border-style:solid;border-color:#c9a96e}
.emoji-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}

/* Review */
.clue-area{background:#fafaf9;border-radius:12px;padding:24px;text-align:center;margin-bottom:20px;border:1.5px solid #f0ebe6}
.clue-area .label{font-size:12px;color:#b8b8b8;margin-bottom:8px}
.clue-area .clue-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.clue-area .clue-words span{background:#fff;border:1.5px solid #e8e2dc;padding:6px 16px;border-radius:8px;font-size:14px;font-weight:500}
.clue-area .clue-emoji{font-size:60px}
.options{display:grid;gap:10px}
.option-btn{padding:13px 18px;border:1.5px solid #e8e2dc;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;text-align:center;font-weight:500}
.option-btn:hover{border-color:#c9a96e;background:#fafaf9}
.option-btn.correct{border-color:#9bb88b;background:#f6f9f4;color:#5a7a4a}
.option-btn.wrong{border-color:#d49595;background:#fdf5f5;color:#8a4a4a}
.option-btn:disabled{cursor:default}

/* Result */
.result-score{text-align:center;padding:28px 0}
.result-score .score-num{font-size:56px;font-weight:700;color:#c9a96e}
.result-score .score-label{font-size:14px;color:#b8b8b8;margin-top:4px}
.result-detail{margin:16px 0}
.result-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f0ebe6}
.result-item .ri-word{font-weight:600;font-size:14px}
.result-item .ri-word .ri-zh{color:#b8b8b8;font-weight:400;font-size:13px}
.result-item .ri-status{font-size:18px}
.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn-primary,.result-actions .btn-secondary{flex:1}
.btn-secondary{padding:13px;background:#fafaf9;border:1.5px solid #e8e2dc;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;color:#2d2d2d}
.btn-secondary:hover{border-color:#d4c5b8;background:#fff}

/* Badges */
.mode-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.mode-badge.toefl{background:#f7f3f0;color:#c9a96e}
.mode-badge.association{background:#f6f9f4;color:#9bb88b}
.mode-badge.emoji{background:#fdf5f5;color:#d49595}

/* Book mgmt */
.mgmt-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mgmt-header h3{font-size:18px;font-weight:700;flex:1}
.mgmt-header .btn-back{padding:6px 12px;border:1.5px solid #e8e2dc;border-radius:8px;background:none;font-size:13px;cursor:pointer;color:#b8b8b8}
.mgmt-header .btn-back:hover{border-color:#d4c5b8;color:#2d2d2d}
.mgmt-list{margin:12px 0}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1.5px solid #f0ebe6;border-radius:10px;margin-bottom:8px;cursor:pointer}
.mgmt-item:hover{border-color:#d4c5b8}
.mgmt-item .mi-info{flex:1}
.mgmt-item .mi-title{font-size:15px;font-weight:600}
.mgmt-item .mi-sub{font-size:12px;color:#b8b8b8;margin-top:2px}
.mgmt-item .mi-actions{display:flex;gap:6px}
.mgmt-item .mi-actions button{padding:4px 10px;border:1px solid #e8e2dc;border-radius:6px;background:none;font-size:12px;cursor:pointer;color:#b8b8b8}
.mgmt-item .mi-actions button:hover{border-color:#d49595;color:#d49595}
.mgmt-item .mi-actions button.edit:hover{border-color:#c9a96e;color:#c9a96e}
.mgmt-add{display:flex;gap:8px;margin-bottom:16px}
.mgmt-add input{flex:1;padding:10px 14px;border:1.5px solid #e8e2dc;border-radius:10px;font-size:14px;outline:0;background:#fafaf9}
.mgmt-add input:focus{border-color:#c9a96e}
.mgmt-add button{padding:10px 20px;background:#c9a96e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.mgmt-add button:hover{background:#b8955a}
.word-add-row{display:flex;gap:8px;margin-bottom:16px}
.word-add-row input{flex:1;padding:10px 14px;border:1.5px solid #e8e2dc;border-radius:10px;font-size:14px;outline:0;background:#fafaf9}
.word-add-row input:focus{border-color:#c9a96e}
.word-add-row button{padding:10px 16px;background:#c9a96e;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.word-add-row button:hover{background:#b8955a}
.wl-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ebe6}
.wl-item .wl-word{font-size:14px;font-weight:600}
.wl-item .wl-zh{font-size:13px;color:#b8b8b8;margin-left:8px}
.wl-item .wl-del{padding:2px 8px;border:none;background:none;font-size:16px;cursor:pointer;color:#d0d0d0}
.wl-item .wl-del:hover{color:#d49595}
.empty-note{text-align:center;padding:32px 0;color:#d0d0d0;font-size:14px}

/* Word progress */
.progress-link{text-align:center;margin-top:14px}
.progress-link a{font-size:13px;color:#c9a96e;cursor:pointer;text-decoration:none}
.progress-link a:hover{text-decoration:underline}
.wp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.wp-stat{text-align:center;padding:16px;background:#fafaf9;border-radius:12px}
.wp-stat .wp-num{font-size:22px;font-weight:700;color:#c9a96e}
.wp-stat .wp-label{font-size:11px;color:#b8b8b8;margin-top:2px}
.wp-search{margin-bottom:16px}
.wp-search input{width:100%;padding:10px 14px;border:1.5px solid #e8e2dc;border-radius:10px;font-size:14px;outline:0;background:#fafaf9}
.wp-search input:focus{border-color:#c9a96e}
.wp-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f0ebe6}
.wp-item .wp-word{font-size:14px;font-weight:600}
.wp-item .wp-zh{font-size:12px;color:#b8b8b8;margin-left:6px}
.wp-item .wp-bar{width:80px;height:6px;background:#f0ebe6;border-radius:3px;overflow:hidden}
.wp-item .wp-bar .wp-fill{height:100%;background:#9bb88b;border-radius:3px}

.hidden{display:none!important}
@media(max-width:500px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-card:last-child{grid-column:span 2}
  .card{padding:20px 16px}
  .word-card .en{font-size:28px}
  .mode-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header id="mainHeader" style="display:none">
  <div class="h-left">
    <h1>📚 联想背单词</h1>
    <p>TOEFL 词汇 · 联想记忆法</p>
  </div>
  <div class="h-right" id="headerRight"></div>
</header>

<div id="emojiModal">
  <div class="modal-box">
    <emoji-picker id="emojiPicker"></emoji-picker>
    <button class="modal-close-btn" id="emojiCloseBtn">关闭</button>
  </div>
</div>

<div class="container" id="app"></div>

<script>
/* ============ CONSTANTS ============ */
const DEFAULT_BOOK_NAME = '托福核心词汇';
const TOEFL_WORDS = [
  {en:'abandon',zh:'放弃'},{en:'abundant',zh:'丰富的'},{en:'accumulate',zh:'积累'},{en:'accurate',zh:'精确的'},{en:'acquire',zh:'获得'},
  {en:'adequate',zh:'足够的'},{en:'advocate',zh:'倡导'},{en:'ambiguous',zh:'模糊的'},{en:'analyze',zh:'分析'},{en:'annual',zh:'每年的'},
  {en:'apparent',zh:'明显的'},{en:'assess',zh:'评估'},{en:'assume',zh:'假设'},{en:'available',zh:'可用的'},{en:'benefit',zh:'好处'},
  {en:'capacity',zh:'能力'},{en:'challenge',zh:'挑战'},{en:'circumstance',zh:'环境'},{en:'clarify',zh:'澄清'},{en:'collapse',zh:'崩溃'},
  {en:'compensate',zh:'补偿'},{en:'complex',zh:'复杂的'},{en:'component',zh:'组成部分'},{en:'concentrate',zh:'集中'},{en:'concept',zh:'概念'},
  {en:'conclude',zh:'得出结论'},{en:'concrete',zh:'具体的'},{en:'conduct',zh:'进行'},{en:'confirm',zh:'确认'},{en:'conflict',zh:'冲突'},
  {en:'consequence',zh:'后果'},{en:'considerable',zh:'相当大的'},{en:'constant',zh:'不变的'},{en:'consume',zh:'消耗'},{en:'contemporary',zh:'当代的'},
  {en:'contradict',zh:'矛盾'},{en:'contribute',zh:'贡献'},{en:'conventional',zh:'传统的'},{en:'convince',zh:'使确信'},{en:'coordinate',zh:'协调'},
  {en:'crucial',zh:'关键的'},{en:'decade',zh:'十年'},{en:'decline',zh:'下降'},{en:'demonstrate',zh:'展示'},{en:'derive',zh:'源于'},
  {en:'diminish',zh:'减少'},{en:'distinct',zh:'不同的'},{en:'distinguish',zh:'区分'},{en:'diverse',zh:'多样的'},{en:'domestic',zh:'国内的'},
  {en:'dominant',zh:'主导的'},{en:'dynamic',zh:'动态的'},{en:'efficient',zh:'高效的'},{en:'eliminate',zh:'消除'},{en:'emerge',zh:'出现'},
  {en:'emphasis',zh:'强调'},{en:'enable',zh:'使能够'},{en:'enormous',zh:'巨大的'},{en:'establish',zh:'建立'},{en:'evaluate',zh:'评估'},
  {en:'evident',zh:'明显的'},{en:'evolve',zh:'进化'},{en:'expand',zh:'扩展'},{en:'explicit',zh:'明确的'},{en:'feasible',zh:'可行的'},
  {en:'flexible',zh:'灵活的'},{en:'fluctuate',zh:'波动'},{en:'focus',zh:'集中'},{en:'function',zh:'功能'},{en:'fundamental',zh:'基本的'},
  {en:'generate',zh:'产生'},{en:'genuine',zh:'真正的'},{en:'global',zh:'全球的'},{en:'guarantee',zh:'保证'},{en:'harmony',zh:'和谐'},
  {en:'highlight',zh:'强调'},{en:'hypothesis',zh:'假设'},{en:'identify',zh:'识别'},{en:'illustrate',zh:'说明'},{en:'impact',zh:'影响'},

const API_BASE = 'http://localhost:3000/api';

/* ============ API HELPERS ============ */
function getToken() { return localStorage.getItem('vocabToken'); }
function setToken(t) { localStorage.setItem('vocabToken', t); }
function clearToken() { localStorage.removeItem('vocabToken'); localStorage.removeItem('vocabCurrentUser'); }

function jwtUser(token) {
  if (!token) return null;
  try { return JSON.parse(atob(token.split('.')[1])).username; } catch { return null; }
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  const t = getToken();
  if (t) headers['Authorization'] = 'Bearer ' + t;
  const res = await fetch(API_BASE + path, { ...opts, headers });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || '请求失败');
  return d;
}
const apiGet = p => api(p);
const apiPost = (p, b) => api(p, { method: 'POST', body: JSON.stringify(b) });
const apiPut = (p, b) => api(p, { method: 'PUT', body: JSON.stringify(b) });
const apiDel = p => api(p, { method: 'DELETE' });

/* ============ HELPERS ============ */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function loadJ(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d}catch{return d}}
function saveJ(k,v){localStorage.setItem(k,JSON.stringify(v))}
function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function maskEmail(e){const [n,d]=e.split('@');return n[0]+'***@'+d}

/* ============ DEFINITION CACHE ============ */
function getCachedDef(w){const c=loadJ(DEF_KEY,{});return c[w]||null}
function setCachedDef(w,d){const c=loadJ(DEF_KEY,{});c[w]=d;saveJ(DEF_KEY,c)}
async function fetchDef(w){
  const c=getCachedDef(w);if(c)return c;
  const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(w));
  if(!r.ok)throw Error('not found');
  const d=await r.json();setCachedDef(w,d);return d;
}
function fmtDef(d){
  if(!d||!d[0]||!d[0].meanings)return null;
  const e=d[0];const ph=e.phonetic||(e.phonetics&&e.phonetics.find(p=>p.text)?.text)||'';
  const m=e.meanings[0];return{phonetic:ph,pos:m.partOfSpeech,def:m.definitions[0]?.definition||''};
}

      if (!checkedInToday) { const s = await getStats(); s.checkInDates.push(today); s.totalSessions = (s.totalSessions || 0) + 1; await saveStats(s); renderHome() }
    });
    document.getElementById('viewProgress').addEventListener('click', renderWordProgress);
    document.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', async () => {
        const a = el.dataset.action;
        if (a === 'start-association') startMode('association');
        else if (a === 'start-emoji') startMode('emoji');
        else if (a === 'continue') { const d = await fetchUserData(); if (d.savedState) { state = d.savedState } _saveSession(); render() }
      })
    });
  } catch (e) {
    $app.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#d49595">加载失败: ' + e.message + '</div>';
  }
}

// ==================== WORD PROGRESS ====================
async function renderWordProgress(){
  $app.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#b8b8b8">加载中...</div>';
  try {
    const [wp, books] = await Promise.all([getWordProgress(), fetchBooks()]);
    const total = Object.keys(wp).length;
    const mastered = Object.values(wp).filter(w => w.total >= 3 && w.correct / (w.total || 1) >= 0.7).length;
    const learning = total - mastered;
    const wordArr = Object.entries(wp).map(([en, p]) => ({ en, zh: p.zh || '', total: p.total || 0, correct: p.correct || 0, wrong: p.wrong || 0, acc: ((p.correct || 0) / ((p.total || 1)) * 100).toFixed(0) }));
    wordArr.sort((a, b) => b.total - a.total);
    const allWords = books[state.selectedBook]?.words || [];
    const withZh = wordArr.map(w => { const f = allWords.find(x => x.en === w.en); return { ...w, zh: f ? f.zh : '' } });

  $app.innerHTML=
    '<div class="card"><div class="mgmt-header"><button class="btn-back" id="wpBack">← 返回</button><h3>📊 我的单词进度</h3></div>'+
    '<div class="wp-stats"><div class="wp-stat"><div class="wp-num">'+total+'</div><div class="wp-label">已学习</div></div><div class="wp-stat"><div class="wp-num">'+mastered+'</div><div class="wp-label">已掌握</div></div><div class="wp-stat"><div class="wp-num">'+learning+'</div><div class="wp-label">学习中</div></div></div>'+
    '<div class="wp-search"><input id="wpSearch" placeholder="搜索单词..."></div>'+
    '<div class="word-list" id="wpList">'+
    (withZh.length===0?'<div class="empty-note">还没有学习记录，开始学习吧</div>':
    withZh.map(w=>'<div class="wp-item"><div><span class="wp-word">'+w.en+'</span><span class="wp-zh">'+w.zh+'</span></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:#b8b8b8">'+(w.correct||0)+'/'+(w.total||0)+'</span><div class="wp-bar"><div class="wp-fill" style="width:'+w.acc+'%"></div></div></div></div>').join(''))+
    '</div></div>';

  document.getElementById('wpBack').addEventListener('click',()=>{state.phase=null;render()});
  document.getElementById('wpSearch').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.wp-item').forEach(el=>{
      const t=el.querySelector('.wp-word').textContent.toLowerCase();
      const zh=el.querySelector('.wp-zh').textContent;
      el.style.display=(t.includes(q)||zh.includes(q))?'flex':'none';
    });
  });
  } catch (e) {
    $app.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#d49595">加载失败: ' + e.message + '</div>';
  }
}

// ==================== BOOK MANAGER ====================
async function renderBookManager(){
  $app.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#b8b8b8">加载中...</div>';
  const books = await fetchBooks();
  const names = Object.keys(books);
  if (!_mgmtViewing) {
    $app.innerHTML = '<div class="card"><div class="mgmt-header"><button class="btn-back" id="mgmtBack">← 返回</button><h3>我的词汇书</h3></div><div class="mgmt-add"><input id="newBookInput" placeholder="输入新词汇书名称"><button id="newBookBtn">新建</button></div><div class="mgmt-list">' + names.map(n => '<div class="mgmt-item" data-book="' + n + '"><div class="mi-info"><div class="mi-title">' + (books[n].isDefault ? '📖' : '📓') + ' ' + n + '</div><div class="mi-sub">' + books[n].words.length + ' 个词</div></div><div class="mi-actions"><button class="edit" data-action="view-book">编辑</button>' + (books[n].isDefault ? '' : '<button data-action="del-book">删除</button>') + '</div></div>').join('') + (names.length === 0 ? '<div class="empty-note">还没有词汇书</div>' : '') + '</div></div>';
    document.getElementById('mgmtBack').addEventListener('click', () => { _mgmtViewing = null; state.phase = null; render() });
    document.getElementById('newBookBtn').addEventListener('click', async () => {
      const inp = document.getElementById('newBookInput'), name = inp.value.trim();
      if (!name) return alert('请输入名称');
      try { await apiPost('/books', { name }); inp.value = ''; renderBookManager(); }
      catch (e) { alert(e.message) }
    });
    document.querySelectorAll('[data-action="del-book"]').forEach(el => {
      el.addEventListener('click', async e => {
        e.stopPropagation(); const n = el.closest('[data-book]').dataset.book;
        if (confirm('确定删除「' + n + '」？')) { try { await apiDel('/books/' + encodeURIComponent(n)); renderBookManager(); } catch (e) { alert(e.message) } }
      })
    });
    document.querySelectorAll('[data-action="view-book"]').forEach(el => { el.addEventListener('click', e => { e.stopPropagation(); _mgmtViewing = el.closest('[data-book]').dataset.book; renderBookManager() }) });
    document.querySelectorAll('.mgmt-item').forEach(el => { el.addEventListener('click', () => { _mgmtViewing = el.dataset.book; renderBookManager() }) });
  } else {
    const book = books[_mgmtViewing]; if (!book) { _mgmtViewing = null; renderBookManager(); return }
    $app.innerHTML = '<div class="card"><div class="mgmt-header"><button class="btn-back" id="mgmtBack">← 返回</button><h3>' + (book.isDefault ? '📖' : '📓') + ' ' + _mgmtViewing + '</h3><span style="font-size:13px;color:#b8b8b8">' + book.words.length + ' 词</span></div><div class="word-add-row"><input id="wordEn" placeholder="英文"><input id="wordZh" placeholder="中文"><button id="addWordBtn">添加</button></div><div class="word-list">' + (book.words.length === 0 ? '<div class="empty-note">还没有单词</div>' : book.words.map((w, i) => '<div class="wl-item"><div><span class="wl-word">' + w.en + '</span><span class="wl-zh">' + w.zh + '</span></div>' + (book.isDefault ? '' : '<button class="wl-del" data-idx="' + i + '">✕</button>') + '</div>').join('')) + '</div>' + (book.isDefault ? '<div style="font-size:12px;color:#d0d0d0;text-align:center;margin-top:12px">默认词汇书不可删除单词</div>' : '') + '</div>';
    document.getElementById('mgmtBack').addEventListener('click', () => { _mgmtViewing = null; renderBookManager() });
    document.getElementById('addWordBtn').addEventListener('click', async () => {
      const en = document.getElementById('wordEn').value.trim(), zh = document.getElementById('wordZh').value.trim();
      if (!en || !zh) return alert('请填写英文和中文');
      try { await apiPost('/books/' + encodeURIComponent(_mgmtViewing) + '/words', { en, zh }); document.getElementById('wordEn').value = ''; document.getElementById('wordZh').value = ''; renderBookManager(); }
      catch (e) { alert(e.message) }
    });
    if (!book.isDefault) {
      document.querySelectorAll('.wl-del').forEach(el => {
        el.addEventListener('click', async () => {
          const idx = parseInt(el.dataset.idx);
          const w = book.words[idx];
          try { await apiDel('/books/' + encodeURIComponent(_mgmtViewing) + '/words/' + encodeURIComponent(w.en)); renderBookManager(); }
          catch (e) { alert(e.message) }
        })
      })
    }
  }
}

// ==================== START MODE ====================
async function startMode(mode){
  const books = await fetchBooks();
  const bn = state.selectedBook && books[state.selectedBook] ? state.selectedBook : DEFAULT_BOOK_NAME;
  const bw = books[bn].words;
  const cnt = Math.min(state.wordCount || 10, bw.length);
  const sel = shuffle(bw).slice(0, cnt);
  state = defaultState(); state.mode = mode; state.phase = 'learning'; state.wordList = sel; state.wordCount = cnt; state.selectedBook = bn;
  const s = await getStats();
  const t = getToday();
  if (!s.checkInDates.includes(t)) { s.checkInDates.push(t); s.totalSessions = (s.totalSessions || 0) + 1; await saveStats(s) }
  await _saveSession(); render();
}

// ==================== LEARNING ====================
function renderLearning(){
  const word=state.wordList[state.currentIdx];
  const total=state.wordList.length,cur=state.currentIdx+1,prg=(cur/total)*100;
  const isAssoc=state.mode==='association';
  const cdef=getCachedDef(word.en);
  let dhtml='<div class="def-loading">加载释义中...</div>';
  if(cdef){const f=fmtDef(cdef);dhtml=f?'<div class="phonetic">'+f.phonetic+'</div><div class="def"><span class="pos">'+f.pos+'</span> '+f.def+'</div>':''}
  else{fetchDef(word.en).catch(()=>setCachedDef(word.en,{_error:true}))}
  let ih='';
  if(isAssoc){
    const sv=state.entries[word.en]?.association||['','','','',''];
    ih='<div style="margin-bottom:14px;text-align:center;font-size:13px;color:#b8b8b8">输入 5 个与 <strong style="color:#2d2d2d">'+word.en+'</strong> 相关的单词</div>'+[0,1,2,3,4].map(i=>'<div class="form-group"><label>联想词 '+(i+1)+'</label><input class="input-field assoc-input" type="text" value="'+sv[i]+'" placeholder="输入相关英语单词" data-idx="'+i+'"></div>').join('');
  }else{
    const sel=state.entries[word.en]?.emoji||'';
    ih='<div style="text-align:center;margin-bottom:14px;font-size:13px;color:#b8b8b8">选择一个 Emoji 代表 <strong style="color:#2d2d2d">'+word.en+'</strong></div><div class="emoji-row"><div class="emoji-display '+(sel?'filled':'')+'" id="emojiDisplay">'+(sel||'?')+'</div><button class="emoji-btn" id="openEmojiBtn">选择 Emoji</button></div>';
  }
  $app.innerHTML='<div class="card"><div class="progress-bar"><button class="btn-exit" id="exitBtn">← 退出</button><div class="progress-track"><div class="progress-fill" style="width:'+prg+'%"></div></div><span class="mode-badge '+(isAssoc?'association':'emoji')+'">'+cur+'/'+total+'</span></div><div class="word-card"><div class="en">'+word.en+'</div>'+dhtml+'<div class="zh">'+word.zh+'</div></div><form id="learningForm">'+ih+'<button type="submit" class="btn-primary">提交</button></form></div>';
  document.getElementById('exitBtn').addEventListener('click',async ()=>{await _saveSession();state=defaultState();render()});
  if(!isAssoc){
    document.getElementById('openEmojiBtn').addEventListener('click',e=>{e.preventDefault();openEmojiPicker(async u=>{document.getElementById('emojiDisplay').textContent=u;document.getElementById('emojiDisplay').classList.add('filled');state.entries[word.en]=state.entries[word.en]||{};state.entries[word.en].emoji=u;await _saveSession()})});
  }
  document.getElementById('learningForm').addEventListener('submit',async e=>{
    e.preventDefault();
    if(isAssoc){
      const inp=document.querySelectorAll('.assoc-input');
      const w=Array.from(inp).map(i=>i.value.trim()).filter(Boolean);
      if(w.length<5)return alert('请填写全部 5 个联想词');
      state.entries[word.en]={association:w};
    }else{if(!state.entries[word.en]?.emoji)return alert('请选择一个 Emoji')}
    const wp=await getWordProgress();
    if(!wp[word.en])wp[word.en]={zh:word.zh,total:0,correct:0,wrong:0,lastReview:''};
    wp[word.en].total=(wp[word.en].total||0)+1;
    wp[word.en].lastReview=getToday();
    await setWordProgress(wp);
    await _saveSession();
    state.currentIdx++;
    if(state.currentIdx>=state.wordList.length){state.phase='review';state.reviewIdx=0;state.reviewResults=[];state.wordList=shuffle(state.wordList);await _saveSession();render()}
    else{await _saveSession();render()}
  });
}

// ==================== REVIEW ====================
function renderReview(){
  const word=state.wordList[state.reviewIdx];
  const total=state.wordList.length,cur=state.reviewIdx+1,prg=(cur/total)*100;
  const entry=state.entries[word.en];const isAssoc=state.mode==='association';
  if(!entry||(isAssoc&&!entry.association)||(!isAssoc&&!entry.emoji)){state.reviewIdx++;if(state.reviewIdx>=total){state.phase='done';_saveSession();render()}else render();return}
  const correct=word.en;
  const others=state.wordList.filter(w=>w.en!==correct).map(w=>w.en).sort(()=>Math.random()-.5).slice(0,3);
  const opts=shuffle([correct,...others]);
  const clue=isAssoc?'<div class="clue-area"><div class="label">你的联想词</div><div class="clue-words">'+entry.association.map(w=>'<span>'+w+'</span>').join('')+'</div></div>':'<div class="clue-area"><div class="label">你选的 Emoji</div><div class="clue-emoji">'+entry.emoji+'</div></div>';
  $app.innerHTML='<div class="card"><div class="progress-bar"><button class="btn-exit" id="exitBtn">← 退出</button><div class="progress-track"><div class="progress-fill" style="width:'+prg+'%"></div></div><span class="mode-badge '+(isAssoc?'association':'emoji')+'">'+cur+'/'+total+'</span></div>'+clue+'<div style="text-align:center;margin-bottom:18px;font-size:15px;font-weight:600">哪个词对应这个联想？</div><div class="options">'+opts.map(o=>'<button class="option-btn" data-word="'+o+'"'+(state.reviewResults[state.reviewIdx]?'disabled':'')+'>'+o+'</button>').join('')+'</div><div id="fb" class="'+(state.reviewResults[state.reviewIdx]?'':'hidden')+'" style="margin-top:16px;text-align:center">'+(state.reviewResults[state.reviewIdx]?(state.reviewResults[state.reviewIdx].correct?'<span style="color:#9bb88b;font-weight:600;font-size:16px">✓ 正确</span>':'<span style="color:#d49595;font-weight:600;font-size:16px">✗ 正确答案是 <strong style="color:#2d2d2d">'+correct+'</strong></span>'):'')+'<br><button class="btn-primary" id="nextBtn" style="margin-top:12px;width:auto;padding:10px 32px">'+(state.reviewIdx<total-1?'下一题':'查看结果')+'</button></div></div>';
  document.getElementById('exitBtn').addEventListener('click',async ()=>{await _saveSession();state=defaultState();render()});
  if(!state.reviewResults[state.reviewIdx]){
    document.querySelectorAll('.option-btn').forEach(btn=>{btn.addEventListener('click',async ()=>{
      const chosen=btn.dataset.word,ok=chosen===correct;
      document.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(b.dataset.word===correct)b.classList.add('correct');else if(b.dataset.word===chosen&&!ok)b.classList.add('wrong')});
      state.reviewResults[state.reviewIdx]={correct:ok,chosen,answer:correct};
      const wp=await getWordProgress();
      if(wp[word.en]){wp[word.en].correct=(wp[word.en].correct||0)+(ok?1:0);wp[word.en].wrong=(wp[word.en].wrong||0)+(ok?0:1);wp[word.en].lastReview=getToday();await setWordProgress(wp)}
      await _saveSession();
      document.getElementById('fb').classList.remove('hidden');
      document.getElementById('fb').innerHTML=(ok?'<span style="color:#9bb88b;font-weight:600;font-size:16px">✓ 正确</span>':'<span style="color:#d49595;font-weight:600;font-size:16px">✗ 正确答案是 <strong style="color:#2d2d2d">'+correct+'</strong></span>')+'<br><button class="btn-primary" id="nextBtn" style="margin-top:12px;width:auto;padding:10px 32px">'+(state.reviewIdx<total-1?'下一题':'查看结果')+'</button>';
      document.getElementById('nextBtn').addEventListener('click',nextReview);
    })});
  }else{document.getElementById('nextBtn').addEventListener('click',nextReview)}
}
async function nextReview(){state.reviewIdx++;if(state.reviewIdx>=state.wordList.length){state.phase='done';await _saveSession();render()}else{await _saveSession();render()}}

// ==================== RESULT ====================
async function renderResult(){
  const results = state.reviewResults;
  const cc = results.filter(r => r && r.correct).length;
  const total = results.length, pct = total > 0 ? Math.round((cc / total) * 100) : 0;
  const isAssoc = state.mode === 'association';
  const s = await getStats();
  s.totalWords = (s.totalWords || 0) + state.wordList.length;
  await saveStats(s);
  const items = state.wordList.map(w => { const r = results.find(res => res && res.answer === w.en); return { word: w, result: r } }).filter(i => i.result);
  $app.innerHTML = '<div class="card"><div style="text-align:center;margin-bottom:4px"><span class="mode-badge ' + (isAssoc ? 'association' : 'emoji') + '">' + (isAssoc ? '联想词' : 'Emoji') + '模式</span></div><div class="result-score"><div class="score-num">' + pct + '%</div><div class="score-label">' + cc + ' / ' + total + ' 正确</div></div><div class="result-detail">' + items.map(i => '<div class="result-item"><span class="ri-word">' + i.word.en + ' <span class="ri-zh">' + i.word.zh + '</span></span><span class="ri-status">' + (i.result.correct ? '✅' : '❌') + '</span></div>').join('') + '</div><div class="result-actions"><button class="btn-primary" data-action="retry">再学一轮</button><button class="btn-secondary" data-action="home">首页</button></div></div>';
  $app.querySelector('[data-action="retry"]').addEventListener('click', () => startMode(state.mode));
  $app.querySelector('[data-action="home"]').addEventListener('click', () => { state = defaultState(); render() });
}

/* ============ STREAK ============ */
function calcStreak(dates){
  if(!dates||!dates.length)return 0;
  const set=new Set(dates);let streak=0,d=new Date();
  if(!set.has(getToday()))d.setDate(d.getDate()-1);
  while(true){
    const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(set.has(s)){streak++;d.setDate(d.getDate()-1)}else break
  }return streak
}
